<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doctor Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="enhanced-styles.css" rel="stylesheet"/>
  <script src="config.js"></script>
  <style>
    :root{ --card-bg: #ffffff; --muted: #6b7280; --accent-1:#4a90e2; --accent-2:#7b61ff; --bg-spot: rgba(122,106,255,0.06)}
    body{ background: radial-gradient(circle at 10% 20%, var(--bg-spot), transparent 10%), linear-gradient(180deg,#fbfdff,#ffffff); min-height:100vh; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    .wrap{ max-width:1100px; margin:44px auto; padding:20px; }
    .profile-card{ display:flex; gap:30px; padding:28px; border-radius:16px; background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,250,255,0.95)); box-shadow: 0 22px 50px rgba(20,40,60,0.06); align-items:center; }
    .left { width:34%; text-align:center; }
    .right{ width:66%; }
    .photo-box{ width:100%; height:220px; background:linear-gradient(135deg,#f6f9ff,#ffffff); border-radius:12px; display:flex; align-items:center; justify-content:center; border:1px dashed rgba(123,97,255,0.08); }
    .photo-box img{ max-width:100%; max-height:100%; border-radius:10px; box-shadow:0 12px 36px rgba(75,66,160,0.08); }
    .name { font-size:28px; font-weight:700; color:#0b1220; }
    .meta { color:var(--muted); margin-bottom:12px; }
    .badge-accent{ background: linear-gradient(90deg,var(--accent-1), var(--accent-2)); color:white; padding:8px 12px; border-radius:999px; font-weight:700; box-shadow: 0 6px 18px rgba(74,144,226,0.08); }
    .info-row{ display:flex; gap:18px; margin-top:10px; align-items:center; flex-wrap:wrap }
    .info-item{ color:var(--muted); }
    .actions{ margin-top:18px; }
    .cta-btn{ border-radius:10px; padding:10px 18px; }
    .btn-back{ background:transparent; border:0; color:var(--muted); padding:8px 12px; font-weight:600; border-radius:10px; transition: all .18s ease; }
    .btn-back:hover{ background:rgba(11,18,32,0.04); color:#071022; transform:translateY(-1px); }
    .btn-cta{ background: linear-gradient(90deg,var(--accent-1),var(--accent-2)); color:white; border:0; box-shadow: 0 8px 30px rgba(123,97,255,0.12); }
    .btn-cta:hover{ filter:brightness(.98); }
    .about{ margin-top:22px; color:#111827; line-height:1.6; }
    .verified{ display:inline-block; background:#e6fffa; color:#065f46; padding:6px 10px; border-radius:999px; font-weight:600; }
    @media(max-width:900px){ .profile-card{ flex-direction:column; } .left,.right{ width:100%; } .photo-box{ height:180px } }
  </style>
</head>
<body>
  <div class="wrap">
    <button id="backBtn" class="btn btn-back d-inline-flex align-items-center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-2" aria-hidden>
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </button>
    <div id="profileArea" class="profile-card mt-3">
      <!-- Loading skeleton shown until JS fills content -->
      <div class="left">
        <div class="photo-box">
          <div class="text-muted">Loading...</div>
        </div>
      </div>
      <div class="right">
        <div style="height:24px; background:linear-gradient(90deg,#eee,#f6f6f6); width:60%; border-radius:6px"></div>
        <div style="height:16px; background:linear-gradient(90deg,#eee,#f6f6f6); width:40%; border-radius:6px; margin-top:10px"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = API_CONFIG.getApiUrl();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || localStorage.getItem('userId');

    // Back button handler: prefer history.back(), fallback to patient dashboard
    const backBtn = document.getElementById('backBtn');
    if(backBtn){ backBtn.addEventListener('click', ()=>{ if(window.history.length>1) history.back(); else window.location.href = 'patient-dashboard.html'; }); }

    function createProfileCard(d){
      const licenseHtml = d.licenseImage ? `<img src="${d.licenseImage}" alt="License image"/>` : `<div class="text-muted">No license image</div>`;
      const verified = d.verified ? `<span class="verified">Verified</span>` : '';
      return `
        <div class="left">
          <div class="photo-box">${licenseHtml}</div>
        </div>
        <div class="right">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="name">Dr. ${d.name || '—'} ${verified}</div>
              <div class="meta">${d.specialty || 'General'} ${d.qualifications ? '• ' + d.qualifications : ''}</div>
            </div>
            <div class="text-end">
              <div class="badge-accent">${d.specialty || 'General'}</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-item"><strong>Clinic / Location:</strong> ${d.clinicAddress || '—'}</div>
            <div class="info-item"><strong>Phone:</strong> ${d.phoneNumber || '—'}</div>
          </div>

          <div class="actions">
                  <a class="btn btn-outline-primary cta-btn me-2" href="mailto:${d.email}"><i class="fas fa-envelope me-2"></i>Message</a>
                  <a class="btn btn-cta cta-btn" href="patient-dashboard.html"><i class="fas fa-calendar-plus me-2"></i>Book Appointment</a>
          </div>

          <div class="about">
            <h5>About</h5>
            <p>${d.bio || '—'}</p>
          </div>
        </div>
      `;
    }

    async function load(){
      try{
        const res = await fetch(`${API_URL}/doctors/${id}`);
        if(!res.ok) throw new Error('Not found');
        const d = await res.json();
        document.getElementById('profileArea').innerHTML = createProfileCard(d);
      }catch(err){
        document.getElementById('profileArea').innerHTML = `<div class="p-4"><div class="alert alert-danger">Doctor not found</div></div>`;
      }
    }

    load();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- lang.js removed -->
</body>
</html>
