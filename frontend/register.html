<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AyuBot - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="config.js"></script>
  <style>
    body { 
      background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh; 
      display: flex; 
      align-items: center;
      padding: 20px 0;
    }
    @keyframes gradient { 
      0%{background-position:0% 50%} 
      50%{background-position:100% 50%} 
      100%{background-position:0% 50%} 
    }
    .register-card { 
      max-width: 600px; 
      margin: auto; 
      border-radius: 30px; 
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4); 
      backdrop-filter: blur(10px);
      background: white;
    }
    .card-header { 
      background: linear-gradient(45deg, #28a745, #20c997); 
      padding: 40px 20px; 
      color: white; 
      text-align: center;
    }
    .card-header h1 { 
      font-size: 42px; 
      font-weight: 900; 
      margin-bottom: 10px;
    }
    .form-control, .form-select { 
      border-radius: 15px; 
      padding: 12px 15px; 
      border: 2px solid #e0e0e0;
      transition: all 0.3s;
    }
    .form-control:focus, .form-select:focus { 
      border-color: #28a745; 
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }
    .btn-register {
      background: linear-gradient(45deg, #28a745, #20c997);
      border: none; 
      padding: 15px; 
      border-radius: 50px; 
      font-size: 18px; 
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(40, 167, 69, 0.4);
      transition: transform 0.2s;
    }
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(40, 167, 69, 0.5);
    }
    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .alert {
      border-radius: 15px;
      padding: 12px 20px;
    }
    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .login-link a {
      color: #28a745;
      font-weight: bold;
      text-decoration: none;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
  
    <div class="card register-card">
      <div class="card-header">
        <h1><i class="fas fa-user-plus"></i> AyuBot</h1>
        <p class="fs-5 mb-0">Create Your Account</p>
      </div>
      <div class="card-body p-5">
        <div id="alertContainer"></div>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input 
                type="text" 
                id="name" 
                class="form-control" 
                
                placeholder="John Doe" 
                required 
                minlength="2"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input 
                type="email" 
                id="email" 
                class="form-control" 
                
                placeholder="john@example.com" 
                required 
              />
            </div>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              
              placeholder="Enter a strong password" 
              required 
              minlength="3"
            />
            <small class="text-muted">Minimum 3 characters</small>
          </div>
          
          <div class="mb-4">
            <label for="role" class="form-label">Register As</label>
            <select id="role" class="form-select" required>
              <option value="">Choose your role...</option>
              <option value="PATIENT">Patient</option>
              <option value="DOCTOR">Doctor</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          
          <button type="submit" id="submitBtn" class="btn btn-register text-white w-100">
            <i class="fas fa-user-plus me-2"></i><span>Create Account</span>
          </button>
        </form>
        
        <div class="login-link">
          <span>Already have an account?</span> <a href="login.html"><span>Login here</span></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = API_CONFIG.getApiUrl();

    function showAlert(message, type = 'danger') {
      const alertContainer = document.getElementById('alertContainer');
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
      
      // Auto dismiss after 5 seconds
      setTimeout(() => {
        const alert = alertContainer.querySelector('.alert');
        if (alert) {
          alert.classList.remove('show');
          setTimeout(() => alertContainer.innerHTML = '', 150);
        }
      }, 5000);
    }

    async function handleRegister(event) {
      event.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      // Client-side validation
      if (!role) {
        showAlert('Please select a role');
        return;
      }

      // Disable submit button
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i>Creating...`;

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: name,
            email: email,
            password: password,
            role: role
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Store user data in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('userEmail', data.email);
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userId', data.userId);

          showAlert('Registration successful', 'success');
          
          // Redirect to appropriate dashboard
          setTimeout(() => {
            if (data.role === 'PATIENT') {
              window.location.href = 'patient-dashboard.html';
            } else if (data.role === 'DOCTOR') {
              window.location.href = 'doctor-dashboard.html';
            } else if (data.role === 'ADMIN') {
              window.location.href = 'admin-dashboard.html';
            }
          }, 1500);
        } else {
          showAlert(data.error || 'Registration failed');
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<i class="fas fa-user-plus me-2"></i>Create Account`;
        }
      } catch (error) {
        console.error('Registration error:', error);
        showAlert('Server is unavailable. Please try again later.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-user-plus me-2"></i>Create Account`;
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="theme.js"></script>
</body>
</html>
