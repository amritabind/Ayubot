<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AyuBot - My Consultations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="config.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      padding-top: 80px;
    }
    .navbar {
      background: var(--card-bg, #1e2a4a);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }
    .navbar-brand {
      font-size: 28px;
      font-weight: 900;
      color: white !important;
    }
    .page-header {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      padding: 40px;
      margin-bottom: 30px;
      border-radius: 20px;
    }
    .stat-card {
      background: var(--card-bg, rgba(255,255,255,0.95));
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      color: var(--text-primary, #333);
    }
    .stat-number {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(45deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .consultation-card {
      background: var(--card-bg, white);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      border-left: 5px solid #667eea;
      transition: all 0.3s;
      color: var(--text-primary, #333);
    }
    .consultation-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .status-badge {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }
    .status-pending { background: #ffc107; color: #000; }
    .status-in_progress { background: #17a2b8; color: white; }
    .status-completed { background: #28a745; color: white; }
    .btn-view {
      background: linear-gradient(45deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 15px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-view:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="patient-dashboard.html">
        <i class="fas fa-robot"></i> AyuBot
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white">
          <i class="fas fa-user-circle me-2"></i>
          <strong id="userName">Welcome</strong>
        </span>
        <button onclick="window.location.href='patient-dashboard.html'" class="btn btn-outline-light btn-sm">
          <i class="fas fa-arrow-left me-1"></i>Back to Dashboard
        </button>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">
          <i class="fas fa-sign-out-alt me-1"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-stethoscope"></i> My Consultations</h1>
      <p class="mb-0">View your consultation history and prescriptions</p>
    </div>

    <!-- Statistics -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-number" id="totalConsultations">0</div>
          <div class="text-muted">Total Consultations</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-number" id="pendingConsultations">0</div>
          <div class="text-muted">Pending</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-number" id="completedConsultations">0</div>
          <div class="text-muted">Completed</div>
        </div>
      </div>
    </div>

    <!-- Consultations List -->
    <div id="consultationsList">
      <div class="text-center py-5">
        <div class="spinner-border text-light" role="status"></div>
        <p class="mt-3 text-white">Loading consultations...</p>
      </div>
    </div>
  </div>

  <!-- Consultation Details Modal -->
  <div class="modal fade" id="consultationModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content" style="border-radius: 20px;">
        <div class="modal-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
          <h5 class="modal-title">Consultation Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalContent"></div>
      </div>
    </div>
  </div>

  <div style="height: 100px;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE_URL = API_CONFIG.getApiUrl();
    let consultations = [];
    let consultationModal;

    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const userId = localStorage.getItem('userId');
      const userName = localStorage.getItem('userName');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      if (userName) {
        document.getElementById('userName').textContent = `Welcome, ${userName}`;
      }

      consultationModal = new bootstrap.Modal(document.getElementById('consultationModal'));

      if (userId) {
        loadConsultations(userId);
      }
    });

    async function loadConsultations(patientId) {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_BASE_URL}/consultations/patient/${patientId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error('Failed to load consultations');

        consultations = await response.json();
        displayConsultations(consultations);
        updateStats();
      } catch (error) {
        console.error('Error loading consultations:', error);
        document.getElementById('consultationsList').innerHTML = `
          <div class="alert alert-danger">Error loading consultations. Please try again later.</div>
        `;
      }
    }

    function displayConsultations(data) {
      const listDiv = document.getElementById('consultationsList');

      if (data.length === 0) {
        listDiv.innerHTML = `
          <div class="text-center text-white py-5">
            <i class="fas fa-inbox fa-5x mb-3" style="opacity: 0.5;"></i>
            <h4>No Consultations Yet</h4>
            <p>Start by using the 3D Symptom Checker</p>
            <button onclick="window.location.href='symptom-3d.html'" class="btn btn-light btn-lg mt-3">
              <i class="fas fa-plus-circle me-2"></i>New Consultation
            </button>
          </div>
        `;
        return;
      }

      listDiv.innerHTML = data.map(c => {
        const date = new Date(c.createdAt).toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const statusClass = `status-${c.status.toLowerCase()}`;
        const doctorName = c.doctorId ? 'Dr. Assigned' : 'No Doctor Assigned';

        return `
          <div class="consultation-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h5><i class="fas fa-calendar"></i> ${date}</h5>
                <span class="status-badge ${statusClass}">${c.status}</span>
              </div>
              <button onclick="viewDetails(${c.id})" class="btn-view">
                <i class="fas fa-eye me-1"></i>View Details
              </button>
            </div>
            <p><strong><i class="fas fa-user-md"></i> Doctor:</strong> ${doctorName}</p>
            <p><strong><i class="fas fa-notes-medical"></i> Your Symptoms:</strong></p>
            <p>${c.symptoms.substring(0, 150)}${c.symptoms.length > 150 ? '...' : ''}</p>
            ${c.affectedArea ? `<p><strong><i class="fas fa-map-marker-alt"></i> Affected Area:</strong> ${c.affectedArea}</p>` : ''}
            <p class="text-muted small"><i class="fas fa-clock"></i> ${new Date(c.createdAt).toLocaleTimeString()}</p>
          </div>
        `;
      }).join('');
    }

    function viewDetails(consultationId) {
      const consultation = consultations.find(c => c.id === consultationId);
      if (!consultation) return;

      const date = new Date(consultation.createdAt).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      const modalContent = document.getElementById('modalContent');
      modalContent.innerHTML = `
        <div class="mb-4">
          <h6><i class="fas fa-calendar-alt me-2"></i>Date:</h6>
          <p>${date}</p>
        </div>

        <div class="mb-4">
          <h6><i class="fas fa-info-circle me-2"></i>Status:</h6>
          <span class="status-badge status-${consultation.status.toLowerCase()}">${consultation.status}</span>
        </div>

        ${consultation.affectedArea ? `
          <div class="mb-4">
            <h6><i class="fas fa-map-marker-alt me-2"></i>Affected Area:</h6>
            <p>${consultation.affectedArea}</p>
          </div>
        ` : ''}

        <div class="mb-4">
          <h6><i class="fas fa-notes-medical me-2"></i>Your Symptoms:</h6>
          <div class="p-3 bg-light rounded">${consultation.symptoms}</div>
        </div>

        <div class="mb-4">
          <h6><i class="fas fa-robot me-2"></i>AI Preliminary Diagnosis:</h6>
          <div class="p-3 bg-info bg-opacity-10 rounded" style="border-left: 4px solid #17a2b8;">
            ${consultation.aiDiagnosis ? consultation.aiDiagnosis.replace(/\n/g, '<br>') : 'Not available'}
          </div>
        </div>

        ${consultation.doctorNotes ? `
          <div class="mb-4">
            <h6><i class="fas fa-user-md me-2"></i>Doctor's Notes:</h6>
            <div class="p-3 bg-success bg-opacity-10 rounded" style="border-left: 4px solid #28a745;">
              ${consultation.doctorNotes.replace(/\n/g, '<br>')}
            </div>
          </div>
        ` : `<div class="alert alert-warning">⏳ Doctor's notes not yet available</div>`}

        ${consultation.prescription ? `
          <div class="mb-4">
            <h6><i class="fas fa-prescription me-2"></i>Prescription:</h6>
            <div class="p-3 bg-warning bg-opacity-10 rounded" style="border-left: 4px solid #ffc107;">
              ${consultation.prescription.replace(/\n/g, '<br>')}
            </div>
          </div>
        ` : ''}
      `;

      consultationModal.show();
    }

    function updateStats() {
      document.getElementById('totalConsultations').textContent = consultations.length;
      document.getElementById('pendingConsultations').textContent = 
        consultations.filter(c => c.status === 'PENDING').length;
      document.getElementById('completedConsultations').textContent = 
        consultations.filter(c => c.status === 'COMPLETED').length;
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    }
  </script>
  <!-- lang.js removed -->
  <script src="theme.js"></script>
</body>
</html>
