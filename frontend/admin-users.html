<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AyuBot - Admin Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="config.js"></script>
</head>
<body>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Manage Users</h1>
      <div>
        <button class="btn btn-outline-secondary" onclick="goBack()">Back</button>
      </div>
    </div>

    <div class="mb-3">
      <button class="btn btn-primary me-2" onclick="loadDoctors()">Show Doctors</button>
      <button class="btn btn-secondary" onclick="loadPatients()">Show Patients</button>
    </div>

    <div id="listArea"></div>
  </div>

  <script>
    const API_URL = API_CONFIG.getApiUrl();
    const adminId = localStorage.getItem('userId');

    function goBack(){ window.location.href='admin-dashboard.html'; }

    async function loadDoctors(){
      const res = await fetch(`${API_URL}/admin/users`);
      const data = await res.json();
      renderList(data.filter(u => u.role === 'DOCTOR'), 'DOCTOR');
    }
    async function loadPatients(){
      const res = await fetch(`${API_URL}/admin/users`);
      const data = await res.json();
      renderList(data.filter(u => u.role === 'PATIENT'), 'PATIENT');
    }

    function renderList(list, role){
      const area = document.getElementById('listArea');
      if (!list || list.length === 0) {
        area.innerHTML = '<div class="alert alert-info">No users found.</div>';
        return;
      }
      let html = '<table class="table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr></thead><tbody>';
      for (const u of list) {
        html += `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>`;
        html += `<button class="btn btn-sm btn-danger me-2" onclick="deleteUser(${u.id})">Delete</button>`;
        html += `<button class="btn btn-sm btn-outline-primary" onclick="changeRole(${u.id})">Change Role</button>`;
        html += '</td></tr>';
      }
      html += '</tbody></table>';
      area.innerHTML = html;
    }

    async function deleteUser(id){
      if (!confirm('Delete user ' + id + '?')) return;
      await fetch(`${API_URL}/admin/users/${id}`, { method: 'DELETE' });
      loadDoctors();
      loadPatients();
    }

    async function changeRole(id){
      const newRole = prompt('Enter new role (PATIENT/DOCTOR/ADMIN):');
      if (!newRole) return;
      const res = await fetch(`${API_URL}/admin/users/${id}/role?role=${newRole}`, { method: 'PUT' });
      if (res.ok) alert('Role changed');
      loadDoctors();
      loadPatients();
    }

    window.addEventListener('DOMContentLoaded', () => {
      const role = localStorage.getItem('userRole');
      if (role !== 'ADMIN') window.location.href = 'login.html';
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- lang.js removed -->
</body>
</html>
