<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AyuBot - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="config.js"></script>
  <style>
    body { 
      background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh; display: flex; align-items: center;
    }
    @keyframes gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .login-card { 
      max-width: 480px; margin: auto; border-radius: 30px; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      background: white;
    }
    .card-header { 
      background: linear-gradient(45deg, #667eea, #764ba2); 
      padding: 50px 20px; color: white; text-align: center;
    }
    .card-header h1 { font-size: 48px; font-weight: 900; }
    .form-control, .form-select { 
      border-radius: 15px; 
      padding: 15px; 
      border: 2px solid #e0e0e0;
      transition: all 0.3s;
    }
    .form-control:focus, .form-select:focus { 
      border-color: #667eea; 
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-login {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none; padding: 15px; border-radius: 50px; font-size: 20px; font-weight: bold;
      box-shadow: 0 10px 30px rgba(102,126,234,0.5);
      transition: transform 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(102,126,234,0.6);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .alert {
      border-radius: 15px;
      padding: 12px 20px;
    }
    .form-label {
      font-weight: 600;
      color: #333;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .register-link a {
      color: #667eea;
      font-weight: bold;
      text-decoration: none;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .demo-info {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <div class="card-header">
        <h1><i class="fas fa-robot"></i> AyuBot</h1>
        <p class="fs-4">AI Medical Assistant</p>
        <!-- language selector removed -->
      </div>
      <div class="card-body p-5">
        <div id="alertContainer"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <label class="form-label fw-bold">Email Address</label>
            <input 
              type="email" 
              id="email" 
              class="form-control form-control-lg" 
              placeholder="your.email@example.com" 
              required 
            />
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-control form-control-lg" 
              placeholder="Enter your password" 
              required 
            />
          </div>
          <div class="mb-3 text-end">
            <a href="#" id="forgotLink">Forgot password?</a>
          </div>
          <button type="submit" id="submitBtn" class="btn btn-login text-white w-100">
            <i class="fas fa-sign-in-alt me-2"></i>LOGIN
          </button>
        </form>
        
        <div class="register-link">
          <span>Don't have an account?</span> <a id="registerLink" href="register.html">Register here</a>
        </div>
        
        <div class="demo-info">
            <small class="text-muted">
            <strong>Demo Accounts:</strong><br>
            Patient: <code>patient@ayubot.com</code> / <code>123</code><br>
            Doctor: <code>doctor@ayubot.com</code> / <code>123</code>
          </small>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = API_CONFIG.getApiUrl();

    // per-page language support removed; page uses static labels

    function showAlert(message, type = 'danger') {
      const alertContainer = document.getElementById('alertContainer');
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
      
      // Auto dismiss after 5 seconds
      setTimeout(() => {
        const alert = alertContainer.querySelector('.alert');
        if (alert) {
          alert.classList.remove('show');
          setTimeout(() => alertContainer.innerHTML = '', 150);
        }
      }, 5000);
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Disable submit button
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Store user data in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('userEmail', data.email);
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userId', data.userId);

          showAlert('Login successful! Redirecting...', 'success');
          
          // Redirect to appropriate dashboard
          setTimeout(() => {
            if (data.role === 'PATIENT') {
              window.location.href = 'patient-dashboard.html';
            } else if (data.role === 'DOCTOR') {
              window.location.href = 'doctor-dashboard.html';
            } else if (data.role === 'ADMIN') {
              window.location.href = 'admin-dashboard.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1000);
        } else {
          showAlert(data.error || 'Invalid email or password');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>LOGIN';
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert('Unable to connect to server. Make sure the backend is running.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>LOGIN';
      }
    }

    // Check if user is already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('userRole');
      
      if (token && role) {
        // User is already logged in, redirect to dashboard
        if (role === 'PATIENT') {
          window.location.href = 'patient-dashboard.html';
        } else if (role === 'DOCTOR') {
          window.location.href = 'doctor-dashboard.html';
        }
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="theme.js"></script>
</body>
</html>
