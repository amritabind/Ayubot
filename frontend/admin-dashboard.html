npx<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AyuBot - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="config.js"></script>
</head>
<body>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Admin Dashboard</h1>
      <div>
        <span id="adminName" class="me-3"></span>
        <button class="btn btn-outline-secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Manage Users</h5>
          <p>View and manage doctors &amp; patients.</p>
          <a href="admin-users.html" class="btn btn-primary">Open</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Create Doctor</h5>
          <p>Create a doctor account under your hospital.</p>
          <button class="btn btn-success" onclick="openCreateDoctor()">Create Doctor</button>
        </div>
      </div>
    </div>

    <div id="createDoctorModal" style="display:none; max-width:600px; margin-top:20px;">
      <div class="card p-4">
        <h5>Create Doctor</h5>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input id="docName" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input id="docEmail" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input id="docPassword" type="password" class="form-control" />
        </div>
        <button class="btn btn-primary" onclick="createDoctor()">Create</button>
        <button class="btn btn-link" onclick="closeCreateDoctor()">Cancel</button>
        <div id="createMsg" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = API_CONFIG.getApiUrl();

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    function openCreateDoctor() {
      document.getElementById('createDoctorModal').style.display = 'block';
    }
    function closeCreateDoctor() {
      document.getElementById('createDoctorModal').style.display = 'none';
    }

    async function createDoctor() {
      const name = document.getElementById('docName').value.trim();
      const email = document.getElementById('docEmail').value.trim();
      const password = document.getElementById('docPassword').value;
      const adminId = localStorage.getItem('userId');

      const payload = { name, email, password, role: 'DOCTOR' };

      const res = await fetch(`${API_URL}/admin/doctors?adminId=${adminId}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      const msg = document.getElementById('createMsg');
      if (res.ok) {
        msg.innerHTML = '<div class="alert alert-success">Doctor created successfully.</div>';
      } else {
        msg.innerHTML = `<div class="alert alert-danger">${data.error || JSON.stringify(data)}</div>`;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const name = localStorage.getItem('userName') || 'Admin';
      document.getElementById('adminName').textContent = name;

      // Redirect non-admins
      const role = localStorage.getItem('userRole');
      if (role !== 'ADMIN') {
        window.location.href = 'login.html';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- lang.js removed -->
</body>
</html>
